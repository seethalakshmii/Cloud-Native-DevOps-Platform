apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: cloud-native-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/seethalakshmii/TASK-5.git
    targetRevision: HEAD
    path: k8s/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: project-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true