name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

permissions:
  id-token: write
  contents: write

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        run: |
          docker build \
            -t task5-frontend:${{ github.sha }} \
            ./frontend

      - name: Tag Image
        run: |
          docker tag task5-frontend:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/task5-frontend:${{ github.sha }}

      - name: Push Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/task5-frontend:${{ github.sha }}

      - name: Update Staging Manifest
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/task5-frontend:${{ github.sha }}

          sed -i \
          "s|image: .*task5-frontend:.*|image: ${IMAGE}|g" \
          k8s/staging/frontend-rollout.yaml

      - name: Update Prod Manifest
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/task5-frontend:${{ github.sha }}

          sed -i \
          "s|image: .*task5-frontend:.*|image: ${IMAGE}|g" \
          k8s/prod/frontend-rollout.yaml

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add \
            k8s/staging/frontend-rollout.yaml \
            k8s/prod/frontend-rollout.yaml

          git commit -m "Deploy frontend ${{ github.sha }}" || exit 0

          git pull --rebase origin main || true

          git push origin main