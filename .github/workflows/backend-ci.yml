name: Backend CI

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run Tests
        run: |
          pytest backend/test-app.py


  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # AWS Authentication (OIDC)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-1

      # Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Docker Image (FIXED NAME)
      - name: Build Docker Image
        run: |
          docker build \
            -t task5-backend:${{ github.sha }} \
            ./backend

      # Tag Image for ECR (FIXED REPO NAME)
      - name: Tag Docker Image
        run: |
          docker tag task5-backend:${{ github.sha }} \
            ${{ steps.login-ecr.outputs.registry }}/task5-backend:${{ github.sha }}

      # Push Image to ECR (FIXED)
      - name: Push Docker Image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/task5-backend:${{ github.sha }}

      # Update Kubernetes manifest (ArgoCD GitOps)
      - name: Update Staging Rollout Manifest
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/task5-backend:${{ github.sha }}

          sed -i \
            "s|image: .*|image: ${IMAGE}|g" \
            k8s/staging/backend-rollout.yaml

      # Commit and push manifest update
      - name: Commit Manifest Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/staging/backend-rollout.yaml

          git commit -m "Update backend image to ${{ github.sha }}" || exit 0

          git push